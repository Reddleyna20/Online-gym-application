<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Registration form</title>
   
</head>

<!-- Body Section -->
<body class="page-background">

    <!-- Header Section -->
    <section class="register">
    <h1>Registration Form</h1>
    <!-- Form Section -->
    <form id="registrationForm" class="form-container">

        <!-- Form Fields Section -->
        <label for="first-name"></label>
        <input type="text" id="first-name" name="first_name" placeholder="Enter your first name" required>

        <label for="last-name"></label>
        <input type="text" id="last-name" name="last_name" placeholder="Enter your last name" required>


        <label for="gender"></label>

<select id="gender" name="gender" required>
    <option value="" selected disabled>Select your gender</option>
    <option value="male">Male</option>
    <option value="female">Female</option>
    <option value="other">Other</option>
</select>



        

        <label for="date-of-birth">Date of Birth</label>
        <input type="date" id="date-of-birth" name="date_of_birth"  required>

        <label for="phone-number"></label>
        <input type="tel" id="phone-number" name="phone_number" placeholder="Enter your phone number" required>

        <label for="email"></label>
        <input type="email" id="email" name="email" placeholder="example@email.com" required>

        <label for="address"></label>
        <input type="text" id="address" name="address" placeholder="Enter your home address" required>

        <label for="occupation"></label>
        <input type="text" id="occupation" name="occupation" placeholder="Enter your occupation" >

        <label for="height"></label>
        <input type="number" id="height" name="height" placeholder="Enter your height (ft)" >

        <label for="weight"></label>
        <input type="number" id="weight" name="weight" placeholder="Enter your weight (kg)" >

        <label for="fitness-goal">Fitness Goal</label>

        <select id="fitness-goal" name="fitness_goal" required>
            <option value="" selected disabled>Select your fitness goal</option>
            <option value="lose-weight">Lose Weight</option>
            <option value="gain-muscle">Gain Muscle</option>
            <option value="maintain-fitness">Maintain Fitness</option>
        </select>

        <label for="medical-condition">Medical Condition</label>

        <select id="medical-condition" name="medical_condition">
            <option value="" selected disabled>Select a medical condition</option>
            <option value="heart-condition">Heart Condition</option>
            <option value="high-blood-pressure">High Blood Pressure</option>
            <option value="asthma">Asthma</option>
            <option value="diabetes">Diabetes</option>
            <option value="joint-injury">Joint Injury</option>
            <option value="other">Other</option>
            <option value="nil">None</option>
        </select>
        

        <label for="emergency-contact"></label>
        <input type="tel" id="emergency-contact" name="emergency_contact" placeholder="Enter emergency contact number" required><br><br>

        <label for="workout-time">Preferred Workout Time</label>

        <select id="workout-time" name="workout_time" required>
            <option value="" selected disabled>Select a time</option>
            <option value="morning">Morning</option>
            <option value="afternoon">Afternoon</option>
            <option value="evening">Evening</option>
        </select>

        <label for="membership">Membership Plan</label>

        <select id="membership" name="membership" required>
            <option value="" selected disabled>Select a plan</option>
            <option value="basic">Basic</option>
            <option value="standard">Standard</option>
            <option value="premium">Premium</option>
        </select>

        



        <input type="submit" value="Register">

        <input type="reset" value="Reset">
    </form>
    <p id="successMessage"></p>
    </section>

    <script src="script.js"></script>
    
</body>
</html>
